<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>ProStroy · Панель</title>
</head>
<body>
  <!-- Статичный топ-бар -->
  <table width="100%" border="1" cellspacing="0" cellpadding="8">
    <tr>
      <td>
        <b>ProStroy — Панель управления</b> | Тема: строительная
      </td>
    </tr>
  </table>

  <!-- Макет: слева меню, справа контент во фрейме -->
  <table width="100%" border="1" cellspacing="0" cellpadding="8">
    <tr>
      <!-- Левое меню -->
      <td width="220" valign="top">
        <p><b>Навигация</b></p>

        <form target="main" action="home.html" method="get">
          <button type="submit">Главная</button>
        </form>

        <form target="main" action="contracts.html" method="get">
          <button type="submit">Договоры</button>
        </form>

        <form target="main" action="transport.html" method="get">
          <button type="submit">Заявки на автотранспорт</button>
        </form>

        <form target="main" action="pto.html" method="get">
          <button type="submit">ПТО / Журналы</button>
        </form>

        <form target="main" action="reports.html" method="get">
          <button type="submit">Отчёты</button>
        </form>

        <form target="main" action="profile.html" method="get">
          <button type="submit">Личный кабинет</button>
        </form>
      </td>

      <!-- Основной контент -->
      <td valign="top">
        <iframe name="main" src="home.html" width="100%" height="600" frameborder="0" title="Контент"></iframe>
      </td>
    </tr>
  </table>
</body>
</html>
