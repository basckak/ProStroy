<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Заявки на автотранспорт</title>
</head>
<body>
  <h1>Заявки на автотранспорт</h1>
  <p>Пример простой формы:</p>
  <form>
    <p>
      <label for="date">Дата:</label>
      <input id="date" name="date" type="date">
    </p>
    <p>
      <label for="object">Объект:</label>
      <input id="object" name="object" type="text">
    </p>
    <p>
      <label for="vehicle">Тип транспорта:</label>
      <select id="vehicle" name="vehicle">
        <option>Самосвал</option>
        <option>Манипулятор</option>
        <option>Автокран</option>
        <option>Бетоносмеситель</option>
      </select>
    </p>
    <p>
      <label for="time">Время подачи:</label>
      <input id="time" name="time" type="time">
    </p>
    <p>
      <button type="submit">Отправить заявку</button>
    </p>
  </form>
</body>
</html>
